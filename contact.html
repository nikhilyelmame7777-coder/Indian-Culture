<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Section</title>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:linear-gradient(to right,#e3f2fd,#ffffff);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .contact-section{
      width:90%;
      max-width:500px;
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 25px rgba(0,0,0,0.15);
      text-align:center;
    }

    .contact-section h1{
      color:#0d47a1;
      margin-bottom:15px;
      font-size:38px;
    }

    .contact-section p{
      color:#555;
      margin-bottom:30px;
      font-size:17px;
    }

    .contact-box{
      display:flex;
      align-items:center;
      gap:15px;
      background:#f5f5f5;
      padding:15px;
      margin:15px 0;
      border-radius:12px;
      transition:0.3s;
    }

    .contact-box:hover{
      transform:translateY(-5px);
      background:#e3f2fd;
    }

    .contact-box i{
      font-size:28px;
      width:50px;
      height:50px;
      display:flex;
      justify-content:center;
      align-items:center;
      border-radius:50%;
      color:white;
    }

    .phone i{
      background:#2e7d32;
    }

    .instagram i{
      background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);
    }

    .facebook i{
      background:#1877f2;
    }

    .contact-info{
      text-align:left;
    }

    .contact-info h3{
      margin-bottom:5px;
      color:#222;
    }

    .contact-info a{
      text-decoration:none;
      color:#555;
      font-size:16px;
    }

    .contact-info a:hover{
      color:#0d47a1;
    }

  </style>
</head>
<body>

  <section class="contact-section" id="contact">

    <h1>Contact Us</h1>

    <p>Feel free to connect with us through mobile or social media.</p>

    <!-- Mobile Number -->
    <div class="contact-box phone">
      <i class="fa-solid fa-phone"></i>

      <div class="contact-info">
        <h3>Mobile Number</h3>
        <a href="tel:8208448247">8208448247</a>
      </div>
    </div>

    <!-- Instagram -->
    <div class="contact-box instagram">
      <i class="fa-brands fa-instagram"></i>

      <div class="contact-info">
        <h3>Instagram</h3>
        <a href="https://www.instagram.com/nikhil_yelmame_7777/">instagram.com/nikhil_yelmame_7777</a>
      </div>
    </div>

    <!-- Facebook -->
    <div class="contact-box facebook">
      <i class="fa-brands fa-facebook-f"></i>

      <div class="contact-info">
        <h3>Facebook</h3>
        <a href="https://www.facebook.com/nikhil_yelmame_7777/">facebook.com/nikhil_yelmame_7777</a>
      </div>
    </div>

  </section>

</body>
</html>
